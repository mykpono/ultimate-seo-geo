name: Validate Plugin

on:
  push:
    paths:
      - '.claude-plugin/**'
      - 'plugins/**'
      - 'SKILL.md'
      - 'references/**'
      - 'scripts/**'
      - 'evals/**'
      - 'setup-plugin.sh'
      - 'scripts/check-plugin-sync.py'
      - 'RELEASE.md'
      - '.github/workflows/validate-plugin.yml'
  pull_request:
    paths:
      - '.claude-plugin/**'
      - 'plugins/**'
      - 'SKILL.md'
      - 'references/**'
      - 'scripts/**'
      - 'evals/**'
      - 'setup-plugin.sh'
      - 'scripts/check-plugin-sync.py'
      - 'RELEASE.md'
      - '.github/workflows/validate-plugin.yml'

jobs:
  validate-json:
    name: Validate JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace.json
        run: |
          echo "Validating .claude-plugin/marketplace.json..."
          python3 -c "
          import json, sys
          with open('.claude-plugin/marketplace.json') as f:
              data = json.load(f)
          # Check required fields
          assert 'name' in data, 'Missing: name'
          assert 'plugins' in data, 'Missing: plugins'
          assert len(data['plugins']) > 0, 'plugins array is empty'
          for p in data['plugins']:
              assert 'name' in p, 'Plugin missing: name'
              assert 'source' in p, 'Plugin missing: source'
              assert 'description' in p, 'Plugin missing: description'
          print('marketplace.json is valid ✓')
          print(f'  Plugins listed: {[p[\"name\"] for p in data[\"plugins\"]]}')
          "

      - name: Validate plugin.json
        run: |
          echo "Validating plugins/ultimate-seo-geo/.claude-plugin/plugin.json..."
          python3 -c "
          import json, sys
          with open('plugins/ultimate-seo-geo/.claude-plugin/plugin.json') as f:
              data = json.load(f)
          assert 'name' in data, 'Missing: name'
          assert 'version' in data, 'Missing: version'
          assert 'description' in data, 'Missing: description'
          # Validate name is kebab-case
          import re
          assert re.match(r'^[a-z0-9-]+$', data['name']), f'Plugin name must be kebab-case, got: {data[\"name\"]}'
          print('plugin.json is valid ✓')
          print(f'  Name: {data[\"name\"]}')
          print(f'  Version: {data[\"version\"]}')
          "

      - name: Check SKILL.md exists
        run: |
          if [ -f "plugins/ultimate-seo-geo/skills/ultimate-seo-geo/SKILL.md" ]; then
            echo "SKILL.md found ✓"
            wc -l plugins/ultimate-seo-geo/skills/ultimate-seo-geo/SKILL.md
          else
            echo "ERROR: plugins/ultimate-seo-geo/skills/ultimate-seo-geo/SKILL.md not found"
            exit 1
          fi

      - name: Check references are present
        run: |
          REF_DIR="plugins/ultimate-seo-geo/skills/ultimate-seo-geo/references"
          if [ -d "$REF_DIR" ]; then
            COUNT=$(ls "$REF_DIR" | wc -l)
            echo "References directory found with $COUNT files ✓"
          else
            echo "ERROR: references directory not found at $REF_DIR"
            exit 1
          fi

      - name: Check bundled scripts and evals
        run: |
          SD="plugins/ultimate-seo-geo/skills/ultimate-seo-geo/scripts"
          ED="plugins/ultimate-seo-geo/skills/ultimate-seo-geo/evals"
          if [ ! -d "$SD" ] || [ -z "$(ls -A "$SD" 2>/dev/null)" ]; then
            echo "ERROR: bundled scripts/ missing or empty at $SD"
            exit 1
          fi
          if [ ! -d "$ED" ] || [ ! -f "$ED/evals.json" ]; then
            echo "ERROR: bundled evals/ or evals.json missing at $ED"
            exit 1
          fi
          echo "Bundled scripts/ and evals/ OK ✓"

      - name: Root vs plugin sync + version alignment
        run: python3 scripts/check-plugin-sync.py

      - name: Compile Python scripts + eval fixture regression
        run: |
          set -e
          for f in scripts/*.py; do python3 -m py_compile "$f"; done
          python3 scripts/score_eval_transcript.py --all-fixtures

      - name: Check GitHub Marketplace Release
        run: |
          echo "Checking whether a GitHub Release exists for the current version..."
          python3 scripts/check_github_release.py --warn
        env:
          # No token needed for public repos; set GITHUB_TOKEN if repo is private.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo ""
          echo "========================================="
          echo "Plugin validation passed ✓"
          echo "Ready for: /plugin marketplace add mykpono/ultimate-seo-geo"
          echo "========================================="
